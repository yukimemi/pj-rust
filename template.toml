name = "pj-rust"
version = "0.3.2"

# Rust language layer. Brings the cargo-make task surface, the
# stable rust-toolchain pin, and the cross-platform CI matrix every
# yukimemi/* Rust project shares. Compose under `pj-base`.

[[file]]
src = "Makefile.toml"
how = "merge-toml"
when = "always"
# kata owns these specific tasks; everything else (consumer-added
# tasks like `install-local`, project-specific release tasks, etc.)
# is left untouched on every `kata apply`.
paths = [
    "tasks.default",
    "tasks.check",
    "tasks.fmt-check",
    "tasks.fmt",
    "tasks.clippy",
    "tasks.test",
    "tasks.test-targets",
    "tasks.test-doc",
    "tasks.lock-check",
    "tasks.publish-dry",
    "tasks.hook-install",
    "tasks.apm-install",
    "tasks.apm-install-update",
    "tasks.setup",
    "tasks.vcs-fetch",
    "tasks.on-add",
]

[[file]]
src = "rust-toolchain.toml"
how = "overwrite"
when = "always"

# CI workflow source carries the `.tera` suffix for two reasons:
# (1) GitHub Actions only runs files ending in `.yml`/`.yaml` under
# `.github/workflows/`, so the `.tera`-suffixed source isn't picked
# up by GHA inside this repo (same protection the old `.template`
# suffix gave); (2) kata Tera-renders `.tera` files at apply time,
# stripping the suffix on the way out — so the consumer ends up
# with `ci.yml`. Action versions pull from `vars.toml` (seeded
# below) so per-PJ Renovate can bump them without `kata apply`
# reverting the bump.
[[file]]
src = ".github/workflows/ci.yml.tera"
how = "overwrite"
when = "always"

# Seed `vars.toml` containing pinned action versions for the CI
# workflow above. `when = "once"` so kata writes it on first apply
# and never touches it after — consumer-owned thereafter, with
# Renovate bumping in-place via the customManager declared in
# `renovate.json`.
[[file]]
src = "vars.toml"
dst = ".kata/vars.toml"
how = "overwrite"
when = "once"

# Rust-layer agent guidance — cargo make / clippy / rust-toolchain
# notes. Lives inside its own marker block so pj-base's
# language-agnostic block and pj-rust-cli's CLI-specific block
# can coexist in the same AGENTS.md.
[[file]]
src = "AGENTS.md.rust"
dst = "AGENTS.md"
how = "merge-section"
when = "always"
marker = { begin = "<!-- kata:agents:rust:begin -->", end = "<!-- kata:agents:rust:end -->" }

# Format / lint policy — yukimemi/* Rust projects share these so
# clippy CI is uniform. Bumped centrally here; local edits in
# consumer PJs are reverted on the next `kata apply`.
[[file]]
src = "rustfmt.toml"
how = "overwrite"
when = "always"

[[file]]
src = "clippy.toml"
how = "overwrite"
when = "always"

# Renovate config: customManagers picks up the `.template`
# workflow files (so `yukimemi/pj-rust` itself can keep its CI
# action versions current) and a packageRules block opts each
# consuming PJ out of touching the kata-managed workflows
# directly. Same json works in both directions.
[[file]]
src = "renovate.json"
how = "overwrite"
when = "always"

# Replace pj-base's apm-install-only renri hook with the
# Rust-flavoured `cargo make on-add` chain (apm-install + vcs-fetch).
# `merge-toml` keyed on `hooks.post_create` so the array-of-tables
# is canonical-from-kata, but consumer comments / unrelated keys
# (e.g. project-specific `[runtime]` sections) survive.
[[file]]
src = "renri.toml.rust"
dst = "renri.toml"
how = "merge-toml"
when = "always"
paths = ["hooks.post_create"]
